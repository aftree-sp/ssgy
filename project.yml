name: ssgy
options:
  bundleIdPrefix: com.aftreeps
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only

targets:
  ssgy:
    type: application
    platform: iOS
    sources:
      - ssgy/
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.aftreeps.ssgy
      INFOPLIST_FILE: ssgy/Info.plist
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
    preBuildScripts:
      - name: "Generate App Icon"
        script: |
          # Generate a simple 1024x1024 PNG icon if not present
          ICON_DIR="${SRCROOT}/ssgy/Assets.xcassets/AppIcon.appiconset"
          ICON_PATH="${ICON_DIR}/icon-1024.png"
          if [ ! -f "$ICON_PATH" ]; then
            # Create a minimal red-on-black icon using Python (available on macOS)
            python3 -c "
import struct, zlib
def create_png(w,h,color):
    raw = b''
    for y in range(h):
        raw += b'\x00'
        for x in range(w):
            cx,cy = x-w//2, y-h//2
            d = ((cx*cx + cy*cy)**0.5)/(w//2)
            r = int(color[0]*(1-min(d,1)))
            g = int(color[1]*(1-min(d,1)))
            b_val = int(color[2]*(1-min(d,1)))
            raw += struct.pack('BBBB', r,g,b_val,255)
    def chunk(ctype,data):
        c = ctype + data
        return struct.pack('>I',len(data)) + c + struct.pack('>I',zlib.crc32(c)&0xffffffff)
    ihdr = struct.pack('>IIBBBBB',w,h,8,6,0,0,0)
    idat = zlib.compress(raw)
    return b'\x89PNG\r\n\x1a\n'+chunk(b'IHDR',ihdr)+chunk(b'IDAT',idat)+chunk(b'IEND',b'')
icon = create_png(1024,1024,(255,59,48))
with open('$ICON_PATH','wb') as f: f.write(icon)
print('Icon generated')
" 2>/dev/null || echo "Icon generation skipped"
          fi
