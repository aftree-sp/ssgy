name: ssgy
options:
  bundleIdPrefix: com.aftreeps
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    SWIFT_VERSION: "6.0"

targets:
  ssgy:
    type: application
    platform: iOS
    sources:
      - path: ssgy/
        excludes:
          - Info.plist
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.aftreeps.ssgy
      INFOPLIST_FILE: ssgy/Info.plist
      CODE_SIGNING_ALLOWED: NO
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGN_IDENTITY: ""
      CODE_SIGN_STYLE: Manual
      DEVELOPMENT_TEAM: ""
