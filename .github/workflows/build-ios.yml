name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          mkdir -p build/ssgy.app

          # Compile AppDelegate → .o
          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios18.5 \
            -parse-as-library -emit-object \
            -o build/AppDelegate.o \
            ssgy/AppDelegate.swift 2>&1
          echo "AppDelegate OK"

          # Compile ViewController → .o
          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios18.5 \
            -parse-as-library -emit-object \
            -o build/ViewController.o \
            ssgy/ViewController.swift 2>&1
          echo "ViewController OK"

          # Link → executable
          swiftc \
            -sdk "$SDK" \
            -target arm64-apple-ios18.5 \
            -emit-executable \
            -o build/ssgy.app/ssgy \
            build/AppDelegate.o build/ViewController.o \
            -framework UIKit -framework AVFoundation 2>&1
          echo "Link OK"

          file build/ssgy.app/ssgy
          cp ssgy/Info.plist build/ssgy.app/
          printf 'APPL????' > build/ssgy.app/PkgInfo

      - name: Package IPA
        run: |
          if [ ! -f build/ssgy.app/ssgy ]; then
            echo "No binary found!"
            exit 1
          fi
          mkdir -p Payload
          cp -R build/ssgy.app Payload/
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: error
