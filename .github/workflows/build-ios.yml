name: Build iOS (unsigned, for sideloading)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-cli binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-tauri
          key: tauri-cli-bin-v2-${{ runner.os }}

      - name: Install tauri-cli
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2"

      - name: Verify cargo-tauri
        run: cargo tauri --version

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Build web frontend
        run: npm run build

      - name: Generate Xcode project
        run: cargo tauri ios init --ci
        working-directory: src-tauri
        env:
          TAURI_APPLE_DEVELOPMENT_TEAM: DUMMYTEAM

      - name: Disable code signing in Xcode project
        run: |
          pbxproj=gen/ios/App.xcodeproj/project.pbxproj
          if [ -f "$pbxproj" ]; then
            # Add CODE_SIGNING_ALLOWED = NO to all build configurations
            sed -i '' 's/CODE_SIGNING_ALLOWED = YES;/CODE_SIGNING_ALLOWED = NO;/g' "$pbxproj" 2>/dev/null || true
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$pbxproj" 2>/dev/null || true
            sed -i '' '/DEVELOPMENT_TEAM/d' "$pbxproj" 2>/dev/null || true
            echo "Signing disabled in Xcode project"
          else
            echo "Warning: $pbxproj not found"
            ls -la gen/ios/App.xcodeproj/ 2>/dev/null || echo "No xcodeproj dir"
          fi
        working-directory: src-tauri

      - name: Inject custom Swift code
        run: |
          mkdir -p gen/ios/App/Sources
          cp src/ios/flash.swift gen/ios/App/Sources/ 2>/dev/null || echo "No custom Swift to inject"
        working-directory: src-tauri

      - name: Build unsigned IPA
        run: cargo tauri ios build --target aarch64-apple-ios --debug
        working-directory: src-tauri
        env:
          TAURI_APPLE_DEVELOPMENT_TEAM: ""
        continue-on-error: true

      - name: Locate and package IPA
        run: |
          # Try common locations for the built IPA
          for p in gen/ios/build/arm64/*.ipa gen/ios/build/*.ipa gen/ios/build/Debug-iphoneos/*.ipa; do
            if [ -f "$p" ]; then
              echo "Found IPA: $p"
              mkdir -p artifacts
              cp "$p" artifacts/ssgy-unsigned.ipa
              break
            fi
          done
          # If no IPA, try creating from .app
          if [ ! -f artifacts/ssgy-unsigned.ipa ]; then
            APP=$(find gen/ios/build -name "*.app" -type d -maxdepth 5 | head -1)
            if [ -n "$APP" ]; then
              echo "Creating unsigned IPA from: $APP"
              mkdir -p Payload
              cp -R "$APP" Payload/
              rm -rf Payload/*.app/_CodeSignature Payload/*.app/embedded.mobileprovision 2>/dev/null || true
              cd Payload && zip -r ../artifacts/ssgy-unsigned.ipa . && cd ..
              ls -lh artifacts/ssgy-unsigned.ipa
            else
              echo "No .app or IPA found anywhere"
              find gen/ios -name "*.ipa" -o -name "*.app" 2>/dev/null | head -20 || true
            fi
          fi
        working-directory: src-tauri

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: src-tauri/artifacts/*.ipa
          if-no-files-found: warn
