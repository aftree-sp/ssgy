name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build web frontend
        run: npm run build

      - name: Generate Xcode project
        run: npx tauri ios init
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}

      - name: Inject custom Swift code into Xcode project
        run: |
          mkdir -p src-tauri/gen/ios/App/Sources
          cp src-tauri/src/ios/flash.swift src-tauri/gen/ios/App/Sources/

      - name: Build iOS debug IPA (for sideloading)
        run: npx tauri ios build --target aarch64-apple-ios --debug
        continue-on-error: true
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}

      - name: Build iOS release IPA (for TestFlight / App Store)
        run: npx tauri ios build --target aarch64-apple-ios
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || '' }}

      - name: Upload debug IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-ios-debug
          path: src-tauri/gen/ios/build/arm64/*.ipa
          if-no-files-found: ignore

      - name: Upload release IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-ios-release
          path: src-tauri/gen/ios/build/arm64_release/*.ipa
          if-no-files-found: ignore
