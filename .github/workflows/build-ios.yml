name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build unsigned iOS .app
        run: |
          flutter build ios --release --no-codesign 2>&1 | tail -50

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          cd Payload && zip -r ../ssgy.ipa . && cd ..
          ls -lh ssgy.ipa
          file ssgy.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy.ipa
          if-no-files-found: error
