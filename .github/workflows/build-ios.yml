name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust (all iOS targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Cache Rust dependencies (app crate)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache tauri-cli binary
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/cargo/bin/cargo-tauri
            /usr/local/cargo/bin/tauri
          key: tauri-cli-bin-v2-${{ runner.os }}

      - name: Install tauri-cli via cargo
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        run: cargo install tauri-cli --version "^2"

      - name: Install CocoaPods
        run: brew install cocoapods

      - name: Build web frontend
        run: npm run build

      - name: Generate Xcode project
        run: cargo tauri ios init
        working-directory: src-tauri
        env:
          TAURI_APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Inject custom Swift code
        run: |
          mkdir -p gen/ios/App/Sources
          cp src/ios/flash.swift gen/ios/App/Sources/
        working-directory: src-tauri

      - name: Build iOS debug IPA
        run: cargo tauri ios build --target aarch64-apple-ios --debug
        continue-on-error: true
        working-directory: src-tauri
        env:
          TAURI_APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build iOS release IPA
        run: cargo tauri ios build --target aarch64-apple-ios
        working-directory: src-tauri
        env:
          TAURI_APPLE_DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload debug IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-ios-debug
          path: src-tauri/gen/ios/build/arm64/*.ipa
          if-no-files-found: ignore

      - name: Upload release IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-ios-release
          path: src-tauri/gen/ios/build/arm64_release/*.ipa
          if-no-files-found: ignore
