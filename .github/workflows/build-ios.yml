name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show project settings
        run: |
          xcodebuild -project ssgy.xcodeproj -scheme ssgy -showBuildSettings | tee build-settings.log

      - name: Build unsigned .app
        run: |
          xcodebuild -project ssgy.xcodeproj \
            -scheme ssgy \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee xcodebuild.log
        continue-on-error: true

      - name: Find and package IPA
        run: |
          echo "=== .app files ==="
          find build -name "*.app" -type d 2>/dev/null || true
          echo "=== .ipa files ==="
          find build -name "*.ipa" 2>/dev/null || true
          echo "=== .xcarchive ==="
          find build -name "*.xcarchive" -type d 2>/dev/null || true

          APP=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found"
            exit 1
          fi

          mkdir -p Payload
          cp -R "$APP" Payload/
          rm -rf Payload/*.app/_CodeSignature 2>/dev/null || true
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            xcodebuild.log
            build-settings.log
          if-no-files-found: ignore
