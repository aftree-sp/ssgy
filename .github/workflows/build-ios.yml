name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app
        run: |
          set -eux
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          mkdir -p build/ssgy.app

          {
            echo "=== print-target-info ==="
            swiftc -print-target-info

            echo "=== swiftc -frontend -help (target) ==="
            swiftc -target arm64-apple-ios18.5 -print-target-info

            echo "=== compile AppDelegate ==="
            swiftc \
              -sdk "$SDK" \
              -target arm64-apple-ios18.5 \
              -emit-object \
              -o build/AppDelegate.o \
              ssgy/AppDelegate.swift
            echo "AppDelegate OK"

            echo "=== compile ViewController ==="
            swiftc \
              -sdk "$SDK" \
              -target arm64-apple-ios18.5 \
              -emit-object \
              -o build/ViewController.o \
              ssgy/ViewController.swift
            echo "ViewController OK"

            echo "=== link ==="
            swiftc \
              -sdk "$SDK" \
              -target arm64-apple-ios18.5 \
              -emit-executable \
              -o build/ssgy.app/ssgy \
              build/AppDelegate.o build/ViewController.o \
              -framework UIKit -framework AVFoundation -framework Foundation
            echo "Link OK"

            file build/ssgy.app/ssgy
            cp ssgy/Info.plist build/ssgy.app/
            printf 'APPL????' > build/ssgy.app/PkgInfo
          } 2>&1 | tee build.log

      - name: Package IPA
        run: |
          if [ ! -f build/ssgy.app/ssgy ]; then
            echo "No binary found!"
            exit 1
          fi
          mkdir -p Payload
          cp -R build/ssgy.app Payload/
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: error

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          if-no-files-found: ignore
