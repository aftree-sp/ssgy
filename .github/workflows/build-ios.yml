name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project ssgy.xcodeproj \
            -scheme ssgy \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package unsigned IPA
        run: |
          APP=$(find build -name "*.app" -type d -maxdepth 4 | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found"
            find build -name "*.app" -o -name "*.ipa" 2>/dev/null | head -10
            exit 1
          fi
          echo "Found .app: $APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          # Strip any signature remnants
          rm -rf Payload/*.app/_CodeSignature 2>/dev/null || true
          rm -rf Payload/*.app/embedded.mobileprovision 2>/dev/null || true
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: error
