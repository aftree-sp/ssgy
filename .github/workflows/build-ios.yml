name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app with swiftc (direct, no Xcode project needed)
        run: |
          set -eux
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          echo "SDK: $SDK"
          mkdir -p build/ssgy.app

          # Compile Swift sources into a single executable
          swiftc \
            -target arm64-apple-ios16.0 \
            -sdk "$SDK" \
            -module-name ssgy \
            -emit-executable \
            -o build/ssgy.app/ssgy \
            ssgy/AppDelegate.swift \
            ssgy/ViewController.swift \
            -framework UIKit \
            -framework AVFoundation \
            -framework Foundation \
            -Xlinker -rpath -Xlinker /usr/lib/swift \
            -tools-destination /dev/null

          echo "=== Binary size ==="
          ls -lh build/ssgy.app/ssgy
          file build/ssgy.app/ssgy

          # Copy Info.plist
          cp ssgy/Info.plist build/ssgy.app/

          # Create PkgInfo (required for iOS app bundles)
          echo -n 'APPL???' > build/ssgy.app/PkgInfo

          echo "=== Bundle contents ==="
          ls -la build/ssgy.app/

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/ssgy.app Payload/
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: error
