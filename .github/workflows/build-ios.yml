name: Build iOS (unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build .app with swiftc
        run: |
          set -euxo pipefail
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>&1)
          echo "SDK path: $SDK"
          mkdir -p build/ssgy.app

          # test minimal iOS compile
          printf 'import UIKit; @main class X: UIResponder, UIApplicationDelegate { var w: UIWindow?; func application(_: UIApplication, didFinishLaunchingWithOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool { return true } }' > /tmp/test.swift
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios16.0 /tmp/test.swift -o /tmp/test_bin -emit-executable 2>&1
          echo "test OK"
          file /tmp/test_bin

          # real app
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios16.0 \
            -o build/ssgy.app/ssgy \
            ssgy/AppDelegate.swift ssgy/ViewController.swift \
            -emit-executable 2>&1
          echo "app OK"
          ls -lh build/ssgy.app/ssgy
          cp ssgy/Info.plist build/ssgy.app/
          printf 'APPL????' > build/ssgy.app/PkgInfo

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/ssgy.app Payload/
          cd Payload && zip -r ../ssgy-unsigned.ipa . && cd ..
          ls -lh ssgy-unsigned.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: ssgy-unsigned
          path: ssgy-unsigned.ipa
          if-no-files-found: error
